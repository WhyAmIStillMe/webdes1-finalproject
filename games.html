<script>
let data = [
  {
    "image": "assets/img/ps5.png",
    "title": "PlayStation 5"
  },
  {
    "image": "assets/img/2.png",
    "title": "PlayStation 4"
  },
  {
    "image": "assets/img/3.png",
    "title": "Nintendo Switch OLED"
  },
  {
    "image": "assets/img/4.png",
    "title": "Xbox Series X"
  },
  {
    "image": "assets/img/5.png",
    "title": "Xbox One"
  },
  {
    "image": "assets/img/6.png",
    "title": "Alex"
  },
  {
    "image": "assets/img/7.png",
    "title": "Emma"
  },
  {
    "image": "assets/img/8.png",
    "title": "Liam"
  },
  {
    "image": "assets/img/9.png",
    "title": "Olivia"
  },
  {
    "image": "assets/img/10.png",
    "title": "Noah"
  },
];
let thetarget = document.querySelector('#putithere');
let seeMoreBtn = document.getElementById('see_more');
const CARDS_PER_LOAD = 5;
let currentIndex = 0;

function createCardHTML(item, index) {
  // Title logic: We'll make the title slightly dynamic based on the index if needed, but sticking to simple text for now.
  let cardTitle = item.title;
  if (index >= 3) {
    // For cards past the initial set, we'll just say "Item X" to show we are appending dynamically
    cardTitle = `Data Card #${index + 1}`;
  }
  return `<div class="card five">
          <div class="card_img" style="background-image:url('${item.image}')"></div>
          <div class="card_title">${cardTitle}</div>
          <button type="button" class="card_btn">Buy</button>
        </div>`;
}

function loadMoreCards() {
  // 1. Determine how many cards to load (up to CARDS_PER_LOAD, but no more than remaining data)
  const cardsToLoad = Math.min(CARDS_PER_LOAD, data.length - currentIndex);

  if (cardsToLoad <= 0) {
    // If no cards left, hide the button
    seeMoreBtn.style.display = 'none';
    console.log("All data loaded. See More button hidden.");
    return;
  }

  // 2. Get the slice of data
  const cardsData = data.slice(currentIndex, currentIndex + cardsToLoad);

  // 3. Generate the HTML string
  let newHTML = '';
  cardsData.forEach((item, indexOffset) => {
    // We pass the original item and the offset within the current batch
    newHTML += createCardHTML(item, currentIndex + indexOffset);
  });

  // 4. Append to the container using insertAdjacentHTML
  thetarget.insertAdjacentHTML('beforeend', newHTML);

  // 5. Update the index marker
  currentIndex += cardsToLoad;

  // 6. Check if we are done, otherwise, the button stays visible
  if (currentIndex >= data.length) {
    seeMoreBtn.style.display = 'none';
  } else {
    // Button stays visible, maybe update text if you want, but keeping it 'See More' for now
    seeMoreBtn.innerText = `See More (${data.length - currentIndex} left)`;
  }
}

// Initial load: Load the first batch immediately when the script runs
loadMoreCards();

// Event listener: Attach the loadMoreCards function to the button click
seeMoreBtn.addEventListener('click', loadMoreCards);
</script>
